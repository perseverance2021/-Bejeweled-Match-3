<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a0a2e">
  <title>Bejeweled Match 3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: safe center;
      background: radial-gradient(ellipse at center, var(--bg-center) 0%, var(--bg-edge) 70%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--body-text, #fff);
      overflow-x: hidden;
      overflow-y: auto;
      transition: background 0.4s ease, color 0.3s;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .game-shell {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--title-1), var(--title-2), var(--title-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px var(--title-glow));
    }

    .header {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .score-panel {
      display: flex;
      gap: 1.5rem;
    }

    .score-box {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 0.5rem 1.2rem;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: background 0.3s, border-color 0.3s;
    }

    .score-box label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--panel-label);
      margin-bottom: 0.2rem;
    }

    .score-box span {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--score-color);
      transition: color 0.3s;
    }

    .game-wrapper {
      position: relative;
      padding: 12px;
      background: var(--board-bg);
      border-radius: 16px;
      box-shadow:
        0 0 40px var(--board-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 2px solid var(--board-border);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 4px;
      width: min(400px, calc(100vw - 2.5rem));
      aspect-ratio: 1;
      height: auto;
      max-width: 100%;
      position: relative;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .cell {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: var(--cell-bg);
      position: relative;
      transition: background 0.3s;
    }

    .gem {
      position: absolute;
      width: calc(100% - 4px);
      height: calc(100% - 4px);
      top: 2px;
      left: 2px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease, top 0.2s ease, left 0.2s ease;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .gem.touch-dragging {
      transition: none;
      z-index: 6;
      filter: brightness(1.15);
    }

    .gem::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      opacity: 0.9;
    }

    .gem::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 20%;
      width: 35%;
      height: 25%;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      filter: blur(2px);
    }

    .gem.red::before { background: linear-gradient(135deg, var(--gem-red-l), var(--gem-red-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-red-g); border-radius: 3px; }
    .gem.blue::before { background: linear-gradient(135deg, var(--gem-blue-l), var(--gem-blue-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-blue-g); border-radius: 50%; }
    .gem.green::before { background: linear-gradient(135deg, var(--gem-green-l), var(--gem-green-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-green-g); inset: auto; width: 70%; height: 70%; top: 15%; left: 15%; border-radius: 4px; transform: rotate(45deg); }
    .gem.yellow::before { background: linear-gradient(135deg, var(--gem-yellow-l), var(--gem-yellow-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-yellow-g); border-radius: 0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
    .gem.purple::before { background: linear-gradient(135deg, var(--gem-purple-l), var(--gem-purple-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-purple-g); border-radius: 0; clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%); }
    .gem.orange::before { background: linear-gradient(135deg, var(--gem-orange-l), var(--gem-orange-d)); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 2px 8px var(--gem-orange-g); border-radius: 0; clip-path: polygon(50% 8%, 92% 88%, 8% 88%); }

    .gem.red::after { top: 12%; left: 18%; width: 28%; height: 22%; }
    .gem.blue::after { top: 18%; left: 24%; width: 26%; height: 26%; }
    .gem.green::after { top: 30%; left: 30%; width: 20%; height: 20%; }
    .gem.yellow::after { top: 10%; left: 38%; width: 20%; height: 20%; }
    .gem.purple::after { top: 14%; left: 32%; width: 22%; height: 18%; }
    .gem.orange::after { top: 24%; left: 38%; width: 20%; height: 16%; }

    .gem:hover:not(.animating) {
      transform: scale(1.08);
      filter: brightness(1.15);
      z-index: 2;
    }

    .gem.selected {
      transform: scale(1.12);
      filter: brightness(1.3);
      z-index: 3;
      animation: pulse 0.6s ease infinite;
    }

  @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--pulse-color); }
      50% { box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.12); }
    }

    .gem.hint {
      animation: hint-bounce 0.8s ease infinite;
    }

    @keyframes hint-bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .gem.matching {
      animation: match-pop 0.4s ease forwards;
    }

    @keyframes match-pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    .gem.falling {
      transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .gem.swapping {
      transition: top 0.2s ease, left 0.2s ease;
      z-index: 5;
    }

    .combo-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      font-weight: 800;
      color: var(--combo-color);
      text-shadow: 0 0 20px var(--combo-glow);
      pointer-events: none;
      z-index: 100;
      animation: combo-fade 1s ease forwards;
    }

    @keyframes combo-fade {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
    }

  .controls {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    button {
      background: var(--btn-bg);
      border: none;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
      letter-spacing: 0.05em;
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px var(--btn-shadow);
    }

    button:active {
      transform: translateY(0);
    }

    button.muted {
      opacity: 0.6;
      background: linear-gradient(135deg, #555, #333);
    }

    button.active {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
    }

    .game-wrapper.auto-play {
      border-color: var(--auto-border);
      box-shadow:
        0 0 40px var(--auto-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .auto-play-badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: var(--auto-badge);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(46, 204, 113, 0.5);
      z-index: 10;
    }

    .auto-play-badge.hidden {
      display: none;
    }

    .hint-text {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: var(--hint-text);
      transition: color 0.3s;
      text-align: center;
      line-height: 1.4;
      padding: 0 0.25rem;
    }

    .touch-hint {
      display: none;
      margin-top: 0.35rem;
      font-size: 0.72rem;
      color: var(--hint-text);
      text-align: center;
      opacity: 0.85;
    }

    @media (pointer: coarse) {
      .touch-hint { display: block; }
      .gem:hover:not(.animating):not(.selected) {
        transform: none;
        filter: none;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.35rem;
        letter-spacing: 0.1em;
        margin-bottom: 0.35rem;
      }

      .header {
        margin-bottom: 0.65rem;
      }

      .score-panel {
        gap: 0.45rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .score-box {
        padding: 0.35rem 0.7rem;
        border-radius: 10px;
      }

      .score-box span {
        font-size: 1.15rem;
      }

      .game-wrapper {
        padding: 8px;
        border-radius: 12px;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .combo-text {
        font-size: 1.35rem;
      }

      button {
        padding: 0.5rem 0.85rem;
        font-size: 0.78rem;
      }

      .hint-text {
        font-size: 0.72rem;
      }

      .mode-tabs {
        max-width: 100%;
        margin-bottom: 0.65rem;
      }

      .theme-picker {
        margin-bottom: 0.5rem;
      }

      .theme-swatches {
        max-width: 100%;
      }

      .game-over-card {
        padding: 1.5rem 1.25rem;
        margin: 1rem;
        max-width: calc(100vw - 2rem);
      }

      .game-over-card .final-score {
        font-size: 2rem;
      }
    }

    .game-over-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }

    .game-over-overlay.hidden {
      display: none;
    }

    .game-over-card {
      background: var(--overlay-card-bg);
      border: 2px solid var(--panel-border);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: 0 0 40px var(--board-glow);
      transition: background 0.3s;
    }

    .game-over-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--title-1), var(--title-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-over-card p {
      color: var(--overlay-text, rgba(255, 255, 255, 0.7));
      margin-bottom: 1.5rem;
    }

    .game-over-card .final-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--score-color);
      margin-bottom: 1.5rem;
    }

    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
    }

    .mode-tab {
      padding: 0.4rem 0.85rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--panel-label);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .mode-tab:hover {
      color: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .mode-tab.active {
      background: var(--btn-bg);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 15px var(--btn-shadow);
    }

    .score-box.hidden {
      display: none;
    }

    .score-box.timer-urgent span {
      color: #ff6b6b;
      animation: timer-pulse 0.8s ease infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .theme-picker {
      display: flex;
      justify-content: center;
      margin-bottom: 0.75rem;
      width: 100%;
    }

    .theme-swatches {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      aspect-ratio: 1;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      margin: 0;
      display: block;
      appearance: none;
      -webkit-appearance: none;
      line-height: 0;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .theme-swatch:hover {
      transform: scale(1.1);
      box-shadow: none;
    }

    .theme-swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
    }

    .theme-swatch:active {
      transform: scale(1.05);
    }

    .theme-swatch.active:active {
      transform: scale(1.12);
    }

    /* Theme: Neon (default) */
    body.theme-neon {
      --bg-center: #1a0a2e;
      --bg-edge: #0d0518;
      --title-1: #ffd700;
      --title-2: #ff6ec7;
      --title-3: #7b68ee;
      --title-glow: rgba(255, 215, 0, 0.4);
      --panel-bg: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.15);
      --panel-label: rgba(255, 255, 255, 0.5);
      --score-color: #ffd700;
      --board-bg: linear-gradient(145deg, #2a1a4a, #1a0a30);
      --board-border: rgba(255, 255, 255, 0.1);
      --board-glow: rgba(123, 104, 238, 0.3);
      --cell-bg: rgba(0, 0, 0, 0.3);
      --btn-bg: linear-gradient(135deg, #7b68ee, #5a4fcf);
      --btn-shadow: rgba(123, 104, 238, 0.5);
      --combo-color: #ffd700;
      --combo-glow: rgba(255, 215, 0, 0.8);
      --pulse-color: rgba(255, 215, 0, 0.8);
      --hint-text: rgba(255, 255, 255, 0.4);
      --overlay-card-bg: linear-gradient(145deg, #2a1a4a, #1a0a30);
      --auto-border: rgba(78, 205, 196, 0.45);
      --auto-glow: rgba(78, 205, 196, 0.35);
      --auto-badge: linear-gradient(135deg, #2ecc71, #27ae60);
      --gem-red-l: #ff3355; --gem-red-d: #cc1133; --gem-red-g: rgba(255,51,85,0.55);
      --gem-blue-l: #3399ff; --gem-blue-d: #1155cc; --gem-blue-g: rgba(51,153,255,0.55);
      --gem-green-l: #22dd66; --gem-green-d: #118844; --gem-green-g: rgba(34,221,102,0.55);
      --gem-yellow-l: #ffdd00; --gem-yellow-d: #cc9900; --gem-yellow-g: rgba(255,221,0,0.55);
      --gem-purple-l: #bb55ff; --gem-purple-d: #7722cc; --gem-purple-g: rgba(187,85,255,0.55);
      --gem-orange-l: #ff8800; --gem-orange-d: #cc5500; --gem-orange-g: rgba(255,136,0,0.55);
    }

    /* Theme: Ocean */
    body.theme-ocean {

      --gem-purple-l: #e56b6f; --gem-purple-d: #9d0208; --gem-purple-g: rgba(229,107,111,0.5);
      --gem-orange-l: #ff6b35; --gem-orange-d: #d00000; --gem-orange-g: rgba(255,107,53,0.55);
    }

    /* Theme: Forest */
    body.theme-forest {
      --bg-center: #1b2e1f;
      --bg-edge: #0a140c;
      --title-1: #95d5b2;
      --title-2: #52b788;
      --title-3: #2d6a4f;
      --title-glow: rgba(82, 183, 136, 0.4);
      --panel-bg: rgba(82, 183, 136, 0.1);

      --overlay-card-bg: linear-gradient(145deg, #065f46, #064e3b);
      --auto-border: rgba(110, 231, 183, 0.4);
      --auto-glow: rgba(16, 185, 129, 0.35);
      --auto-badge: linear-gradient(135deg, #34d399, #047857);
      --gem-red-l: #f87171; --gem-red-d: #b91c1c; --gem-red-g: rgba(248,113,113,0.5);
      --gem-blue-l: #5eead4; --gem-blue-d: #0f766e; --gem-blue-g: rgba(94,234,212,0.5);
      --gem-green-l: #4ade80; --gem-green-d: #15803d; --gem-green-g: rgba(74,222,128,0.55);
      --gem-yellow-l: #fde047; --gem-yellow-d: #a16207; --gem-yellow-g: rgba(253,224,71,0.5);
      --gem-purple-l: #a78bfa; --gem-purple-d: #6d28d9; --gem-purple-g: rgba(167,139,250,0.5);
      --gem-orange-l: #fb923c; --gem-orange-d: #c2410c; --gem-orange-g: rgba(251,146,60,0.5);
    }
  </style>
</head>
<body>
  <div class="game-shell">
  <h1>Bejeweled</h1>
  <div class="theme-picker">
    <div class="theme-swatches" id="themeSwatches"></div>
  </div>
  <div class="mode-tabs" id="modeTabs"></div>
  <div class="header">
    <div class="score-panel">
      <div class="score-box">
        <label>Score</label>
        <span id="score">0</span>
      </div>
      <div class="score-box hidden" id="timerBox">
        <label>Time</label>
        <span id="timer">60</span>
      </div>
      <div class="score-box hidden" id="targetBox">
        <label>Target</label>
        <span id="target">1000</span>
      </div>
      <div class="score-box">
        <label>Best</label>
        <span id="best">0</span>
      </div>
    </div>
  </div>
  <div class="game-wrapper" id="gameWrapper">
    <span id="autoPlayBadge" class="auto-play-badge hidden">AI Playing</span>
    <div id="board"></div>
  </div>
  <div class="controls">
    <button id="newGame">New Game</button>
    <button id="hintBtn">Hint</button>
    <button id="watchBtn" type="button">Watch AI</button>
    <button id="muteBtn" type="button">🔊 Sound</button>
  </div>
  <p class="hint-text" id="modeDescription">Click a gem, then click an adjacent gem to swap — play until no moves remain</p>
  <p class="touch-hint" id="touchHint">Tap to select · Swipe to swap · Tap again to deselect</p>
  </div>

  <div id="gameOverOverlay" class="game-over-overlay hidden">
    <div class="game-over-card">
      <h2 id="gameOverTitle">No More Moves!</h2>
      <p id="gameOverMessage">You've run out of valid swaps.</p>
      <div class="final-score" id="finalScore">0</div>
      <button id="playAgain">Play Again</button>
    </div>
  </div>

  <script>
    const ROWS = 8;
    const COLS = 8;
    const GEM_TYPES = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
    const GAP = 4;
    const SWIPE_THRESHOLD = 22;

    const THEMES = {
      neon: { name: 'Neon', swatch: 'linear-gradient(135deg, #7b68ee, #ff6ec7)' },
      ocean: { name: 'Ocean', swatch: 'linear-gradient(135deg, #0077b6, #48cae4)' },
      sunset: { name: 'Sunset', swatch: 'linear-gradient(135deg, #ff6b35, #f72585)' },
      forest: { name: 'Forest', swatch: 'linear-gradient(135deg, #2d6a4f, #95d5b2)' },
      midnight: { name: 'Midnight', swatch: 'linear-gradient(135deg, #1b263b, #778da9)' },
      candy: { name: 'Candy', swatch: 'linear-gradient(135deg, #ff85a1, #cdb4db)' },
      aurora: { name: 'Aurora', swatch: 'linear-gradient(135deg, #34d399, #818cf8, #c084fc)' },
      volcano: { name: 'Volcano', swatch: 'linear-gradient(135deg, #ff4500, #ffd700)' },
      lavender: { name: 'Lavender', swatch: 'linear-gradient(135deg, #c4b5fd, #a78bfa)' },
      retro: { name: 'Retro', swatch: 'linear-gradient(135deg, #ff00ff, #00ffff)' },
      gold: { name: 'Gold', swatch: 'linear-gradient(135deg, #ffd700, #c9a227)' },
      arctic: { name: 'Arctic', swatch: 'linear-gradient(135deg, #dbeafe, #38bdf8)' },
      cherry: { name: 'Cherry', swatch: 'linear-gradient(135deg, #fb7185, #e11d48)' },
      emerald: { name: 'Emerald', swatch: 'linear-gradient(135deg, #10b981, #6ee7b7)' }
    };

    let currentTheme = localStorage.getItem('bejeweled-theme') || 'neon';
    if (!THEMES[currentTheme]) currentTheme = 'neon';

    const GAME_MODES = {
      classic: {
        id: 'classic',
        name: 'Classic',
        description: 'Play until no valid swaps remain on the board.',
        endOnNoMoves: true,
        shuffleOnNoMoves: false,
        timed: false,
        targetScore: null
      },
      timed: {
        id: 'timed',
        name: 'Timed',
        description: 'Score as much as you can in 60 seconds — board reshuffles if you get stuck.',
        endOnNoMoves: false,
        shuffleOnNoMoves: true,
        timed: true,
        duration: 60,
        targetScore: null
      },
      zen: {
        id: 'zen',
        name: 'Zen',
        description: 'Relaxed endless play — the board reshuffles whenever you run out of moves.',
        endOnNoMoves: false,
        shuffleOnNoMoves: true,
        timed: false,
        targetScore: null
      },
      challenge: {
        id: 'challenge',
        name: 'Challenge',
        description: 'Reach 1,000 points to win — but watch out, no moves means game over.',
        endOnNoMoves: true,
        shuffleOnNoMoves: false,
        timed: false,
        targetScore: 1000
      }
    };

    let grid = [];
    let score = 0;
    let currentMode = localStorage.getItem('bejeweled-mode') || 'classic';
    if (!GAME_MODES[currentMode]) currentMode = 'classic';
    if (!localStorage.getItem('bejeweled-best-classic') && localStorage.getItem('bejeweled-best')) {
      saveBest('classic', parseInt(localStorage.getItem('bejeweled-best') || '0', 10));
    }
    let best = loadBest(currentMode);
    let selected = null;
    let isAnimating = false;
    let gameOver = false;
    let autoPlaying = false;
    let hintInterval = null;
    let timerInterval = null;
    let timeRemaining = 60;
    let touchState = null;
    let suppressNextClick = false;

    const board = document.getElementById('board');
    const gameWrapper = document.getElementById('gameWrapper');
    const watchBtn = document.getElementById('watchBtn');
    const autoPlayBadge = document.getElementById('autoPlayBadge');
    const modeTabs = document.getElementById('modeTabs');
    const themeSwatches = document.getElementById('themeSwatches');
    const modeDescription = document.getElementById('modeDescription');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const timerBox = document.getElementById('timerBox');
    const timerEl = document.getElementById('timer');
    const targetBox = document.getElementById('targetBox');
    const targetEl = document.getElementById('target');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const gameOverTitle = document.getElementById('gameOverTitle');
    const gameOverMessage = document.getElementById('gameOverMessage');
    const finalScoreEl = document.getElementById('finalScore');

    function getMode() {
      return GAME_MODES[currentMode];
    }

    function loadBest(modeId) {
      return parseInt(localStorage.getItem(`bejeweled-best-${modeId}`) || '0', 10);
    }

    function saveBest(modeId, value) {
      localStorage.setItem(`bejeweled-best-${modeId}`, value.toString());
    }

    function updateBestScore() {
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        saveBest(currentMode, best);
      }
    }

    function applyTheme(themeId) {
      currentTheme = themeId;
      localStorage.setItem('bejeweled-theme', themeId);
      document.body.className = 'theme-' + themeId;
      themeSwatches.querySelectorAll('.theme-swatch').forEach(swatch => {
        swatch.classList.toggle('active', swatch.dataset.theme === themeId);
      });
    }

    function buildThemePicker() {
      themeSwatches.innerHTML = '';
      Object.entries(THEMES).forEach(([id, theme]) => {
        const swatch = document.createElement('button');
        swatch.type = 'button';
        swatch.className = 'theme-swatch' + (id === currentTheme ? ' active' : '');
        swatch.dataset.theme = id;
        swatch.title = theme.name;
        swatch.style.background = theme.swatch;
        swatch.addEventListener('click', () => {
          if (id === currentTheme) return;
          applyTheme(id);
        });
        themeSwatches.appendChild(swatch);
      });
      applyTheme(currentTheme);
    }

    function buildModeTabs() {
      modeTabs.innerHTML = '';
      Object.values(GAME_MODES).forEach(mode => {
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'mode-tab' + (mode.id === currentMode ? ' active' : '');
        tab.dataset.mode = mode.id;
        tab.textContent = mode.name;
        tab.addEventListener('click', () => {
          if (mode.id === currentMode) return;
          currentMode = mode.id;
          localStorage.setItem('bejeweled-mode', currentMode);
          best = loadBest(currentMode);
          updateModeUI();
          newGame();
          Sfx.newGame();
        });
        modeTabs.appendChild(tab);
      });
    }

    function updateModeUI() {
      const mode = getMode();
      modeDescription.textContent = mode.description;
      modeTabs.querySelectorAll('.mode-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.mode === currentMode);
      });
      timerBox.classList.toggle('hidden', !mode.timed);
      targetBox.classList.toggle('hidden', !mode.targetScore);
      if (mode.targetScore) targetEl.textContent = mode.targetScore;
      bestEl.textContent = best;
    }

    buildThemePicker();
    buildModeTabs();
    updateModeUI();

    const GEM_PITCHES = {
      red: 523, blue: 392, green: 330, yellow: 659, purple: 494, orange: 440
    };

    const Sfx = (() => {
      let ctx = null;
      let muted = localStorage.getItem('bejeweled-muted') === '1';

      function init() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        return ctx;
      }

      function tone(freq, duration, type = 'sine', volume = 0.12, delay = 0) {
        if (muted) return;
        const ac = init();
        const t = ac.currentTime + delay;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(volume, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(t);
        osc.stop(t + duration + 0.05);
      }

      function slide(from, to, duration, volume = 0.1) {
        if (muted) return;
        const ac = init();
        const t = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(from, t);
        osc.frequency.linearRampToValueAtTime(to, t + duration);
        gain.gain.setValueAtTime(volume, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(t);
        osc.stop(t + duration + 0.05);
      }

      function pop(freq, volume = 0.15) {
        if (muted) return;
        const ac = init();
        const t = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq * 1.5, t);
        osc.frequency.exponentialRampToValueAtTime(freq, t + 0.06);
        gain.gain.setValueAtTime(volume, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(t);
        osc.stop(t + 0.12);

        const bufferSize = Math.floor(ac.sampleRate * 0.04);
        const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const nGain = ac.createGain();
        nGain.gain.setValueAtTime(volume * 0.4, t);
        nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        const filter = ac.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 2000;
        noise.connect(filter);
        filter.connect(nGain);
        nGain.connect(ac.destination);
        noise.start(t);
      }

      function arpeggio(notes, step = 0.07, volume = 0.1) {
        notes.forEach((freq, i) => tone(freq, step * 2, 'sine', volume, i * step));
      }

      return {
        isMuted: () => muted,
        setMuted: (value) => {
          muted = value;
          localStorage.setItem('bejeweled-muted', muted ? '1' : '0');
        },
        warmup: () => init(),
        select: (gemType) => tone(GEM_PITCHES[gemType] || 440, 0.07, 'sine', 0.1),
        swap: () => slide(350, 500, 0.12, 0.09),
        reject: () => {
          slide(300, 180, 0.18, 0.12);
          tone(150, 0.15, 'sawtooth', 0.06, 0.05);
        },
        match: (count, combo) => {
          const base = 400 + Math.min(count, 6) * 40;
          const pops = Math.min(count, 5);
          for (let i = 0; i < pops; i++) {
            pop(base + i * 60 + combo * 30, 0.1 + i * 0.02);
          }
        },
        combo: (level) => arpeggio([523, 659, 784, 1047].slice(0, Math.min(level, 4)), 0.08, 0.11),
        cascade: () => tone(280, 0.08, 'sine', 0.05),
        hint: () => arpeggio([440, 554], 0.1, 0.08),
        gameOver: () => arpeggio([392, 330, 262, 196], 0.15, 0.12),
        win: () => arpeggio([523, 659, 784, 1047], 0.12, 0.12),
        newGame: () => arpeggio([262, 330, 392, 523], 0.1, 0.1)
      };
    })();

    const muteBtn = document.getElementById('muteBtn');
    function updateMuteButton() {
      muteBtn.textContent = Sfx.isMuted() ? '🔇 Muted' : '🔊 Sound';
      muteBtn.classList.toggle('muted', Sfx.isMuted());
    }
    updateMuteButton();
    muteBtn.addEventListener('click', () => {
      initAudioOnInteraction();
      Sfx.setMuted(!Sfx.isMuted());
      updateMuteButton();
      if (!Sfx.isMuted()) Sfx.select('yellow');
    });

    function initAudioOnInteraction() {
      if (!Sfx.isMuted()) Sfx.warmup();
    }
    document.addEventListener('click', initAudioOnInteraction, { once: true });

    function randomGem() {
      return GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
    }

    function createGrid() {
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = randomGem();
        }
      }
      while (findMatches().length > 0) {
        for (const { r, c } of findMatches()) {
          grid[r][c] = randomGem();
        }
      }
    }

    function findMatches() {
      const matched = new Set();

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 2; c++) {
          const type = grid[r][c];
          if (type && grid[r][c + 1] === type && grid[r][c + 2] === type) {
            let end = c + 2;
            while (end + 1 < COLS && grid[r][end + 1] === type) end++;
            for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
          }
        }
      }

      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS - 2; r++) {
          const type = grid[r][c];
          if (type && grid[r + 1][c] === type && grid[r + 2][c] === type) {
            let end = r + 2;
            while (end + 1 < ROWS && grid[end + 1][c] === type) end++;
            for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
          }
        }
      }

      return Array.from(matched).map(s => {
        const [r, c] = s.split(',').map(Number);
        return { r, c };
      });
    }

    function findAllPossibleMoves() {
      const moves = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (c < COLS - 1) {
            swapInGrid(r, c, r, c + 1);
            const matches = findMatches();
            if (matches.length > 0) {
              moves.push({ r1: r, c1: c, r2: r, c2: c + 1, matchCount: matches.length });
            }
            swapInGrid(r, c, r, c + 1);
          }
          if (r < ROWS - 1) {
            swapInGrid(r, c, r + 1, c);
            const matches = findMatches();
            if (matches.length > 0) {
              moves.push({ r1: r, c1: c, r2: r + 1, c2: c, matchCount: matches.length });
            }
            swapInGrid(r, c, r + 1, c);
          }
        }
      }
      return moves;
    }

    function pickBestMove() {
      const moves = findAllPossibleMoves();
      if (moves.length === 0) return null;
      const maxMatch = Math.max(...moves.map(m => m.matchCount));
      const bestMoves = moves.filter(m => m.matchCount === maxMatch);
      return bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    function shuffleBoard() {
      let attempts = 0;
      while (attempts < 40) {
        const gems = [];
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) gems.push(grid[r][c]);
        }
        for (let i = gems.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [gems[i], gems[j]] = [gems[j], gems[i]];
        }
        let idx = 0;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) grid[r][c] = gems[idx++];
        }
        if (findMatches().length === 0 && findPossibleMoves() !== null) return;
        attempts++;
      }
      createGrid();
      while (findPossibleMoves() === null) createGrid();
    }

    function handleNoMoves() {
      const mode = getMode();
      if (mode.shuffleOnNoMoves) {
        shuffleBoard();
        renderBoard();
        showBoardMessage('Reshuffling!');
        return;
      }
      if (mode.endOnNoMoves) endGame('no_moves');
    }

    function checkWinCondition() {
      const mode = getMode();
      if (mode.targetScore && score >= mode.targetScore) {
        endGame('win');
        return true;
      }
      return false;
    }

    function updateTimerDisplay() {
      timerEl.textContent = timeRemaining;
      timerBox.classList.toggle('timer-urgent', timeRemaining <= 10);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      stopTimer();
      const mode = getMode();
      if (!mode.timed) return;
      timeRemaining = mode.duration;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        if (gameOver || isAnimating) return;
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) endGame('time_up');
      }, 1000);
    }

    function findPossibleMoves() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (c < COLS - 1) {
            swapInGrid(r, c, r, c + 1);
            if (findMatches().length > 0) {
              swapInGrid(r, c, r, c + 1);
              return [{ r, c }, { r, c: c + 1 }];
            }
            swapInGrid(r, c, r, c + 1);
          }
          if (r < ROWS - 1) {
            swapInGrid(r, c, r + 1, c);
            if (findMatches().length > 0) {
              swapInGrid(r, c, r + 1, c);
              return [{ r, c }, { r: r + 1, c }];
            }
            swapInGrid(r, c, r + 1, c);
          }
        }
      }
      return null;
    }

    function swapInGrid(r1, c1, r2, c2) {
      const tmp = grid[r1][c1];
      grid[r1][c1] = grid[r2][c2];
      grid[r2][c2] = tmp;
    }

    function getBoardMetrics() {
      const width = board.clientWidth;
      const cellSize = (width - GAP * (COLS - 1)) / COLS;
      return { cellSize, gap: GAP };
    }

    function getGemPosition(r, c) {
      const { cellSize, gap } = getBoardMetrics();
      return {
        top: r * (cellSize + gap),
        left: c * (cellSize + gap),
        size: cellSize
      };
    }

    function layoutGems() {
      board.querySelectorAll('.gem').forEach(gem => {
        const r = parseInt(gem.dataset.row, 10);
        const c = parseInt(gem.dataset.col, 10);
        const pos = getGemPosition(r, c);
        gem.style.top = pos.top + 'px';
        gem.style.left = pos.left + 'px';
        gem.style.width = pos.size + 'px';
        gem.style.height = pos.size + 'px';
      });
    }

    function renderBoard() {
      board.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          board.appendChild(cell);

          if (grid[r][c]) {
            const gem = createGemElement(r, c, grid[r][c]);
            board.appendChild(gem);
          }
        }
      }
      layoutGems();
    }

    function createGemElement(r, c, type) {
      const gem = document.createElement('div');
      gem.className = `gem ${type}`;
      gem.dataset.row = r;
      gem.dataset.col = c;
      const pos = getGemPosition(r, c);
      gem.style.top = pos.top + 'px';
      gem.style.left = pos.left + 'px';
      gem.style.width = pos.size + 'px';
      gem.style.height = pos.size + 'px';
      gem.addEventListener('click', () => {
        if (suppressNextClick) return;
        handleGemClick(r, c);
      });
      return gem;
    }

    function getGemAtPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      const gem = el?.closest?.('.gem');
      if (!gem || !board.contains(gem)) return null;
      return {
        r: parseInt(gem.dataset.row, 10),
        c: parseInt(gem.dataset.col, 10)
      };
    }

    function clearTouchDragVisual() {
      if (!touchState) return;
      const gem = getGemElement(touchState.r, touchState.c);
      if (gem) {
        gem.classList.remove('touch-dragging');
        gem.style.transform = '';
      }
    }

    function onBoardTouchStart(e) {
      if (isAnimating || gameOver || autoPlaying) return;
      const t = e.changedTouches[0];
      const gem = getGemAtPoint(t.clientX, t.clientY);
      if (!gem) return;
      touchState = {
        r: gem.r,
        c: gem.c,
        x: t.clientX,
        y: t.clientY,
        dragging: false
      };
    }

    function onBoardTouchMove(e) {
      if (!touchState) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchState.x;
      const dy = t.clientY - touchState.y;
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
        touchState.dragging = true;
        e.preventDefault();
        const gem = getGemElement(touchState.r, touchState.c);
        if (gem) {
          gem.classList.add('touch-dragging');
          const { size } = getBoardMetrics();
          const limit = size * 0.38;
          if (Math.abs(dx) > Math.abs(dy)) {
            const shift = Math.max(-limit, Math.min(limit, dx));
            gem.style.transform = `translate(${shift}px, 0) scale(1.1)`;
          } else {
            const shift = Math.max(-limit, Math.min(limit, dy));
            gem.style.transform = `translate(0, ${shift}px) scale(1.1)`;
          }
        }
      }
    }

    function onBoardTouchEnd(e) {
      if (!touchState) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchState.x;
      const dy = t.clientY - touchState.y;
      clearTouchDragVisual();

      suppressNextClick = true;
      setTimeout(() => { suppressNextClick = false; }, 350);

      if (touchState.dragging &&
          (Math.abs(dx) > SWIPE_THRESHOLD || Math.abs(dy) > SWIPE_THRESHOLD)) {
        let r2 = touchState.r;
        let c2 = touchState.c;
        if (Math.abs(dx) > Math.abs(dy)) c2 += dx > 0 ? 1 : -1;
        else r2 += dy > 0 ? 1 : -1;

        if (r2 >= 0 && r2 < ROWS && c2 >= 0 && c2 < COLS &&
            Math.abs(r2 - touchState.r) + Math.abs(c2 - touchState.c) === 1) {
          clearSelection();
          attemptSwap(touchState.r, touchState.c, r2, c2);
        }
      } else {
        handleGemClick(touchState.r, touchState.c);
      }
      touchState = null;
    }

    function onBoardTouchCancel() {
      clearTouchDragVisual();
      touchState = null;
    }

    function initTouchControls() {
      board.addEventListener('touchstart', onBoardTouchStart, { passive: true });
      board.addEventListener('touchmove', onBoardTouchMove, { passive: false });
      board.addEventListener('touchend', onBoardTouchEnd, { passive: false });
      board.addEventListener('touchcancel', onBoardTouchCancel, { passive: true });

      new ResizeObserver(() => layoutGems()).observe(board);
      window.addEventListener('orientationchange', () => {
        setTimeout(layoutGems, 100);
      });
    }

    function getGemElement(r, c) {
      return board.querySelector(`.gem[data-row="${r}"][data-col="${c}"]`);
    }

    function handleGemClick(r, c) {
      if (isAnimating || gameOver || autoPlaying) return;

      if (!selected) {
        selected = { r, c };
        const gem = getGemElement(r, c);
        if (gem) gem.classList.add('selected');
        Sfx.select(grid[r][c]);
        return;
      }

      const { r: sr, c: sc } = selected;
      const gem = getGemElement(sr, sc);
      if (gem) gem.classList.remove('selected');

      if (sr === r && sc === c) {
        selected = null;
        return;
      }

      const isAdjacent = (Math.abs(sr - r) + Math.abs(sc - c)) === 1;

      if (!isAdjacent) {
        selected = { r, c };
        const newGem = getGemElement(r, c);
        if (newGem) newGem.classList.add('selected');
        Sfx.select(grid[r][c]);
        return;
      }

      selected = null;
      attemptSwap(sr, sc, r, c);
    }

    async function attemptSwap(r1, c1, r2, c2) {
      isAnimating = true;
      Sfx.swap();

      const gem1 = getGemElement(r1, c1);
      const gem2 = getGemElement(r2, c2);

      if (gem1 && gem2) {
        gem1.classList.add('swapping');
        gem2.classList.add('swapping');

        const pos1 = getGemPosition(r2, c2);
        const pos2 = getGemPosition(r1, c1);

        gem1.style.top = pos1.top + 'px';
        gem1.style.left = pos1.left + 'px';
        gem2.style.top = pos2.top + 'px';
        gem2.style.left = pos2.left + 'px';

        await sleep(200);
      }

      swapInGrid(r1, c1, r2, c2);

      const matches = findMatches();
      if (matches.length === 0) {
        Sfx.reject();
        swapInGrid(r1, c1, r2, c2);
        if (gem1 && gem2) {
          const pos1 = getGemPosition(r1, c1);
          const pos2 = getGemPosition(r2, c2);
          gem1.style.top = pos1.top + 'px';
          gem1.style.left = pos1.left + 'px';
          gem2.style.top = pos2.top + 'px';
          gem2.style.left = pos2.left + 'px';
          await sleep(200);
        }
        renderBoard();
        isAnimating = false;
        return;
      }

      renderBoard();

      await processMatches();

      if (!gameOver && getMode().endOnNoMoves && findPossibleMoves() === null) {
        handleNoMoves();
      }

      isAnimating = false;
    }

    async function processMatches() {
      let combo = 0;

      while (true) {
        const matches = findMatches();
        if (matches.length === 0) break;

        combo++;
        const points = matches.length * 10 * combo;
        score += points;
        scoreEl.textContent = score;

        if (checkWinCondition()) return;

        Sfx.match(matches.length, combo);
        if (combo > 1) {
          showComboText(combo);
          Sfx.combo(combo);
        }

        for (const { r, c } of matches) {
          const gem = getGemElement(r, c);
          if (gem) gem.classList.add('matching');
        }

        await sleep(400);

        for (const { r, c } of matches) {
          grid[r][c] = null;
        }

        await applyGravity();
        await fillEmpty();
        Sfx.cascade();
        renderBoard();
        await sleep(100);
      }

      updateBestScore();

      if (gameOver) return;

      if (findPossibleMoves() === null) {
        handleNoMoves();
      }
    }

    const GAME_OVER_TEXT = {
      no_moves: {
        title: 'No More Moves!',
        message: 'You\'ve run out of valid swaps.'
      },
      time_up: {
        title: 'Time\'s Up!',
        message: 'The clock ran out — here\'s your final score.'
      },
      win: {
        title: 'You Win!',
        message: 'Target score reached — great job!'
      }
    };

    function endGame(outcome = 'no_moves') {
      if (gameOver) return;
      gameOver = true;
      stopAutoPlay();
      stopTimer();
      updateBestScore();
      const text = GAME_OVER_TEXT[outcome] || GAME_OVER_TEXT.no_moves;
      gameOverTitle.textContent = text.title;
      gameOverMessage.textContent = text.message;
      if (outcome === 'win') Sfx.win();
      else Sfx.gameOver();
      finalScoreEl.textContent = score;
      gameOverOverlay.classList.remove('hidden');
    }

    function showBoardMessage(text) {
      const el = document.createElement('div');
      el.className = 'combo-text';
      el.textContent = text;
      board.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function showComboText(combo) {
      const el = document.createElement('div');
      el.className = 'combo-text';
      el.textContent = `${combo}x Combo!`;
      board.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    async function applyGravity() {
      for (let c = 0; c < COLS; c++) {
        let writeRow = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (grid[r][c] !== null) {
            if (r !== writeRow) {
              grid[writeRow][c] = grid[r][c];
              grid[r][c] = null;
            }
            writeRow--;
          }
        }
      }
    }

    async function fillEmpty() {
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
          if (grid[r][c] === null) {
            grid[r][c] = randomGem();
          }
        }
      }
    }

    function showHint() {
      if (isAnimating || gameOver || autoPlaying) return;
      const move = findPossibleMoves();
      if (!move) return;

      Sfx.hint();
      for (const { r, c } of move) {
        const gem = getGemElement(r, c);
        if (gem) gem.classList.add('hint');
      }

      clearTimeout(hintInterval);
      hintInterval = setTimeout(() => {
        for (const { r, c } of move) {
          const gem = getGemElement(r, c);
          if (gem) gem.classList.remove('hint');
        }
      }, 2000);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function updateWatchButton() {
      watchBtn.textContent = autoPlaying ? 'Stop Watching' : 'Watch AI';
      watchBtn.classList.toggle('active', autoPlaying);
      gameWrapper.classList.toggle('auto-play', autoPlaying);
      autoPlayBadge.classList.toggle('hidden', !autoPlaying);
    }

    function clearSelection() {
      if (!selected) return;
      const gem = getGemElement(selected.r, selected.c);
      if (gem) gem.classList.remove('selected');
      selected = null;
    }

    function stopAutoPlay() {
      autoPlaying = false;
      updateWatchButton();
    }

    async function autoPlayLoop() {
      while (autoPlaying && !gameOver) {
        if (isAnimating) {
          await sleep(80);
          continue;
        }

        const move = pickBestMove();
        if (!move) break;

        clearSelection();
        const gem = getGemElement(move.r1, move.c1);
        if (gem) gem.classList.add('selected');
        Sfx.select(grid[move.r1][move.c1]);
        await sleep(450);

        if (!autoPlaying) {
          if (gem) gem.classList.remove('selected');
          break;
        }

        if (gem) gem.classList.remove('selected');
        await attemptSwap(move.r1, move.c1, move.r2, move.c2);

        if (!autoPlaying || gameOver) break;
        await sleep(350);
      }

      stopAutoPlay();
    }

    function startAutoPlay() {
      if (autoPlaying || isAnimating) return;
      if (gameOver) newGame();
      clearSelection();
      autoPlaying = true;
      updateWatchButton();
      autoPlayLoop();
    }

    function toggleAutoPlay() {
      if (autoPlaying) {
        stopAutoPlay();
      } else {
        startAutoPlay();
      }
    }

    function newGame() {
      stopAutoPlay();
      stopTimer();
      score = 0;
      selected = null;
      isAnimating = false;
      gameOver = false;
      scoreEl.textContent = '0';
      gameOverOverlay.classList.add('hidden');
      timerBox.classList.remove('timer-urgent');
      createGrid();
      while (findPossibleMoves() === null) {
        createGrid();
      }
      renderBoard();
      requestAnimationFrame(layoutGems);
      startTimer();
    }

    document.getElementById('newGame').addEventListener('click', () => {
      newGame();
      Sfx.newGame();
    });
    document.getElementById('hintBtn').addEventListener('click', showHint);
    watchBtn.addEventListener('click', () => {
      initAudioOnInteraction();
      toggleAutoPlay();
    });
    document.getElementById('playAgain').addEventListener('click', () => {
      newGame();
      Sfx.newGame();
    });

    initTouchControls();
    newGame();
  </script>
</body>
</html>
